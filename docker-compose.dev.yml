---
services:
  grabberty-backend-dev:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports: 
      - 3000:3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:3000/api/ping >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    volumes:
      - ./logs:/app/logs