name: Publish Docker Image

on:
  push:
    branches:
      - frontend
      - frontend-dev

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        if: github.ref_name == 'frontend'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (frontend-dev)
        if: github.ref_name == 'frontend-dev'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false

      - name: Build & Push (frontend)
        if: github.ref_name == 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/marcusnebel/grabberty-frontend:latest
            ghcr.io/marcusnebel/grabberty-frontend:${{ github.sha }}